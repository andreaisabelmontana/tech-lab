<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects — Technology with Impact</title>
<style>
  :root{--ink:#1f1d1a;--muted:#7a756c;--line:#e7e3da;--bg:#faf8f3;--accent:#3a5a8c;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:17px/1.65 Georgia,'Iowan Old Style','Times New Roman',serif;}
  .wrap{max-width:740px;margin:0 auto;padding:72px 24px 110px;}
  .crumb{font:12px/1.5 ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:0 0 30px;}
  .crumb a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line);}
  .crumb a:hover{color:var(--accent);}
  h1{font-size:36px;line-height:1.1;margin:0 0 8px;letter-spacing:-.01em;}
  .sub{color:var(--muted);font-style:italic;margin:0 0 44px;}
  ul{list-style:none;margin:0;padding:0;}
  li{border-top:1px solid var(--line);}
  li:last-child{border-bottom:1px solid var(--line);}
  a.proj{display:flex;justify-content:space-between;align-items:baseline;gap:18px;padding:18px 6px;text-decoration:none;color:var(--ink);transition:background .15s;}
  a.proj:hover{background:#fff;}
  a.proj:hover .name{color:var(--accent);}
  .name{font-size:20px;}
  .tag{font:11px/1 ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);white-space:nowrap;}
  .tag.src{color:var(--muted);}
  footer{margin-top:46px;font:13px/1.6 ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif;}
  footer a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line);}
  footer a:hover{color:var(--accent);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="./course.html">Technology with Impact</a> &nbsp;·&nbsp; Projects</div>
    <h1>Projects</h1>
    <p class="sub">1 project built for this course.</p>
    <ul>
      <li><a class="proj" href="./project.html"><span class="name">Automate a workflow with no-code + GenAI</span><span class="tag">Worked example</span></a></li>
    </ul>
    <footer><a href="./course.html">← Course notes</a></footer>
  </div>
</body>
</html>
